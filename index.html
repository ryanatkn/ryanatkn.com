<!DOCTYPE html>
<html lang="en">
	<head>
		<title>ryanatkn.com</title>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no"
		/>
		<link rel="icon" type="image/png" href="favicon.png" />
	</head>

	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			overflow-wrap: break-word;
		}
		html {
			height: 100%;
			width: 100%;
			padding: 0;
		}
		body {
			height: 100%;
			background-color: #000;
			color: rgb(255, 247, 247);
			padding: 0;
			font-size: 16px;
			font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen,
				Ubuntu, Cantarell, 'Open Sans', Fira Sans, Droid Sans, Helvetica Neue,
				sans-serif;
			font-weight: 100;
		}
		a {
			color: #ebb;
		}
		img {
			max-width: 100%;
		}
		#root {
			height: 100%;
		}
		#bg1 {
			background: url('assets/flowers.jpg') repeat;
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			opacity: 0.03;
			background-size: 1052px;
		}
		#bg2 {
			background: url('assets/flowers.jpg') repeat;
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			opacity: 0.04;
			background-size: 650px;
		}
		#bg3 {
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			box-shadow: 0 0 90px 50px rgba(0, 0, 0, 0.8) inset;
		}
		#content {
			position: relative;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		.item {
			padding: 20px;
			transition: transform 0.04s ease-out;
			border: 5px dotted transparent;
		}
		.item:hover {
			transform: scale3d(1.06, 1.06, 1.06);
			border-color: #343;
		}
		.item:active {
			transform: scale3d(0.94, 0.94, 0.94);
			border-color: #556;
		}
	</style>

	<body>
		<div id="root">
			<div id="bg1"></div>
			<div id="bg2"></div>
			<div id="bg3"></div>
			<div id="content">
				<section
					style="
						display: flex;
						justify-content: center;
						align-items: center;
						flex-wrap: wrap;
						padding: 10px;
					"
				>
					<a class="item" href="https://felt.social">
						<img
							src="assets/characters/felt.png"
							style="width: 192px; max-height: 178px;"
							alt="felt.social green heart"
						/>
					</a>
					<a class="item" href="https://cosmicplayground.org">
						<img
							src="assets/characters/cosmic-kitty.jpg"
							style="width: 192px; max-height: 192px; border-radius: 50%;"
							alt="cosmic kitty of cosmicplayground"
						/>
					</a>
					<a class="item" href="https://github.com/ryanatkn">
						<img
							style="width: 120px; max-height: 120px;"
							alt="octokitty"
							src="assets/characters/octocat.png"
						/>
					</a>
					<a class="item" href="https://twitter.com/ryanatkn">
						<img
							style="width: 110px; max-height: 110px;"
							alt="twitterbird"
							src="assets/characters/twit.png"
						/>
					</a>
				</section>
				<a
					class="item"
					href="mailto:mail@ryanatkn.com"
					style="
						font-size: 24px;
						color: #fff;
						text-decoration: none;
						font-weight: 100;
						display: flex;
						flex-direction: column;
						align-items: center;
					"
				>
					<span style="font-size: 3em; line-height: 1;">✉</span>
					<span>mail@ryanatkn.com</span>
				</a>
			</div>
		</div>
	</body>
</html>
