<!DOCTYPE html>
<html lang="en">
	<head>
		<title>ryanatkn.com</title>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no"
		/>
		<link rel="icon" type="image/png" href="favicon.png" />
		<link rel="stylesheet" href="bundle.css" />
	</head>

	<style>
		body {
			font-size: 16px;
			font-family: Roboto, -apple-system, BlinkMacSystemFont, Segoe UI, Oxygen,
				Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
			font-weight: 100;
		}
		.item {
			padding: 20px;
			transition: transform 0.04s ease-out;
		}
		.item:hover {
			transform: scale3d(1.06, 1.06, 1.06);
		}
		.item:active {
			transform: scale3d(0.94, 0.94, 0.94);
		}
	</style>

	<body>
		<div id="root">
			<section
				style="display: flex; justify-content: center; align-items: center; flex-wrap: wrap; padding: 10px;"
			>
				<noscript>
					<div style="max-width: 300px; padding-right: 10px;">
						<p>
							JavaScript is disabled. If you enable it, fun and surprising
							things could happen!
						</p>
						<p>
							I insist on respecting you and your machines - the
							<a href="https://github.com/ryanatkn/ryanatkn.com">source code</a>
							encourages criticism.
						</p>
					</div>
				</noscript>
				<a class="item" href="https://felt.dev">
					<img
						src="assets/characters/feltf.png"
						style="width: 256px; height: 256px;"
					/>
				</a>
				<a class="item" href="https://cosmicplayground.org">
					<img
						src="assets/characters/cosmic-kitty.jpg"
						style="width: 192px; height: 192px; border-radius: 50%;"
					/>
				</a>
				<a class="item" href="https://felt.social">
					<img
						src="assets/characters/felt.png"
						style="width: 192px; height: 178px;"
					/>
				</a>
				<a class="item" href="https://github.com/ryanatkn">
					<img
						style="width: 120px; height: 120px;"
						src="assets/characters/octocat.png"
					/>
				</a>
				<a class="item" href="https://twitter.com/ryanatkn">
					<img
						style="width: 110px; height: 110px;"
						src="assets/characters/twit.png"
					/>
				</a>
				<a class="item" href="https://patreon.com/ryanatkn">
					<img
						style="width: 192px; height: 192px;"
						src="assets/characters/pat.png"
					/>
				</a>
				<a
					class="item"
					href="mailto:mail@ryanatkn.com"
					style="font-size: 24px; color: #fff; text-decoration: none; font-weight: 100; display: flex; flex-direction: column; align-items: center;"
				>
					<span style="font-size: 3em; line-height: 1;">✉</span>
					<span style="font-size: 1.5em;">mail@ryanatkn.com</span>
				</a>
			</section>
		</div>
		<script src="bundle.js"></script>
	</body>
</html>
