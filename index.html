<!DOCTYPE html>
<html lang="en">
	<head>
		<title>ryanatkn.com</title>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no"
		/>
		<link rel="icon" type="image/png" href="favicon.png" />
	</head>

	<style>
		html {
			height: 100%;
			padding: 0;
			margin: 0;
		}
		body {
			height: 100%;
			background-color: #000;
			color: rgb(255, 247, 247);
			padding: 0;
			margin: 0;
			font-size: 16px;
			font-family: Roboto, -apple-system, BlinkMacSystemFont, Segoe UI, Oxygen,
				Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
			font-weight: 100;
		}
		a {
			color: #ebb;
		}
		#root {
			height: 100%;
		}
		#bg1 {
			background: url('assets/flowers.jpg') repeat;
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			opacity: 0.03;
			background-size: 1052px;
		}
		#bg2 {
			background: url('assets/flowers.jpg') repeat;
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			opacity: 0.04;
			background-size: 650px;
		}
		#bg3 {
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			top: 0;
			z-index: 0;
			box-shadow: 0 0 90px 50px rgba(0, 0, 0, 0.8) inset;
		}
		#content {
			position: relative;
		}
		.item {
			padding: 20px;
			transition: transform 0.04s ease-out;
		}
		.item:hover {
			transform: scale3d(1.06, 1.06, 1.06);
		}
		.item:active {
			transform: scale3d(0.94, 0.94, 0.94);
		}
	</style>

	<body>
		<div id="root">
			<div id="bg1"></div>
			<div id="bg2"></div>
			<div id="bg3"></div>
			<div id="content">
				<section
					style="
						display: flex;
						justify-content: center;
						align-items: center;
						flex-wrap: wrap;
						padding: 10px;
					"
				>
					<a class="item" href="https://felt.social">
						<img
							src="assets/characters/felt.png"
							style="width: 192px; height: 178px;"
						/>
					</a>
					<a class="item" href="https://felt.dev">
						<img
							src="assets/characters/feltf.png"
							style="width: 256px; height: 256px;"
						/>
					</a>
					<a class="item" href="https://cosmicplayground.org">
						<img
							src="assets/characters/cosmic-kitty.jpg"
							style="width: 192px; height: 192px; border-radius: 50%;"
						/>
					</a>
					<a class="item" href="https://github.com/ryanatkn">
						<img
							style="width: 120px; height: 120px;"
							src="assets/characters/octocat.png"
						/>
					</a>
					<a class="item" href="https://twitter.com/ryanatkn">
						<img
							style="width: 110px; height: 110px;"
							src="assets/characters/twit.png"
						/>
					</a>
					<a
						class="item"
						href="mailto:mail@ryanatkn.com"
						style="
							font-size: 24px;
							color: #fff;
							text-decoration: none;
							font-weight: 100;
							display: flex;
							flex-direction: column;
							align-items: center;
						"
					>
						<span style="font-size: 3em; line-height: 1;">✉</span>
						<span style="font-size: 1.5em;">mail@ryanatkn.com</span>
					</a>
				</section>
			</div>
		</div>
	</body>
</html>
